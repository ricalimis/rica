<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<title>Money Diary</title>

<style>

body{
    font-family: Arial;
    background:#ffeef5;
    text-align:center;
}

.container{
    width:400px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

input,select,button{
    width:90%;
    padding:10px;
    margin:8px;
    border-radius:8px;
}

button{
    background:pink;
    border:none;
}

li{
    list-style:none;
    background:#f5f5f5;
    margin:5px;
    padding:8px;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>💖 Money Diary</h2>

<input id="target" type="number" placeholder="存钱目标">

<input id="saved" type="number" placeholder="当前存款">

<button onclick="saveData()">保存</button>

<hr>

<select id="type">
<option>🍜 吃饭</option>
<option>🎮 娱乐</option>
<option>⚡ 电费</option>
<option>🏠 家用</option>
</select>

<input id="amount" type="number" placeholder="花费金额">

<button onclick="addExpense()">添加花费</button>

<button onclick="deleteSelected()">删除选中</button>

<p id="status"></p>

<ul id="list"></ul>

</div>

<script>

let records =
JSON.parse(localStorage.getItem("records")) || [];

function saveData(){

localStorage.setItem(
"target",
document.getElementById("target").value
);

localStorage.setItem(
"saved",
document.getElementById("saved").value
);

update();

}

function addExpense(){

let type =
document.getElementById("type").value;

let amount =
parseFloat(
document.getElementById("amount").value
);

if(!amount || amount <= 0){
return;
}

records.push({
type:type,
amount:amount
});

let saved =
parseFloat(localStorage.getItem("saved")) || 0;

saved -= amount;

localStorage.setItem("saved",saved);

localStorage.setItem(
"records",
JSON.stringify(records)
);

update();

}

function deleteSelected(){

let checks =
document.querySelectorAll(".chk");

for(let i = checks.length-1; i >=0; i--){

if(checks[i].checked){

let saved =
parseFloat(localStorage.getItem("saved")) || 0;

saved += records[i].amount;

localStorage.setItem("saved",saved);

records.splice(i,1);

}

}

localStorage.setItem(
"records",
JSON.stringify(records)
);

update();

}

function update(){

let target =
parseFloat(localStorage.getItem("target")) || 0;

let saved =
parseFloat(localStorage.getItem("saved")) || 0;

let percent = 0;

if(target > 0){
percent = ((saved / target) * 100).toFixed(1);
}

document.getElementById("status").innerText =
"💰 存款：" +
saved +
" / " +
target +
" (" +
percent +
"%)";

let list =
document.getElementById("list");

list.innerHTML = "";

records.forEach(function(r){

let li = document.createElement("li");

li.innerHTML =
'<input type="checkbox" class="chk"> ' +
r.type +
' - 💸 ' +
r.amount;

list.appendChild(li);

});

}

update();

</script>

</body>
</html>
